name: Classic
description: Traditional style with cream background and visible borders

background:
  color: "#F5F5DC"  # Beige/cream

borders:
  enabled: true
  width: 4
  color: "#8B7355"  # Brown
  shadow: true

spacing:
  grid_gap: 15  # pixels between photos
  page_margin: 30  # pixels around page edges

layouts: # Defines layout templates for different photo counts and orientations
  # Each template has:
  # - count: The number of photos this template is designed for.
  # - photos: A list of specifications for each photo's placement.
  #   - orientation: 'landscape' or 'portrait'. Used for matching and sizing.
  #   - position: {x: 0.0-1.0, y: 0.0-1.0} - Center point of the photo, relative to page. (0.0,0.0 is top-left, 0.5,0.5 is center)
  #   - size: 0.0-1.0 - Relative size. For landscape, this is % of page width. For portrait, % of page height.
  - count: 1
    photos:
      - orientation: landscape
        position: {x: 0.5, y: 0.5}
        size: 0.9 # 90% of page width
  - count: 1
    photos:
      - orientation: portrait
        position: {x: 0.5, y: 0.5}
        size: 0.9 # 90% of page height

  # 2 Photos
  - count: 2
    photos:
      - orientation: landscape
        position: {x: 0.25, y: 0.5}
        size: 0.45 # 45% of page width
      - orientation: landscape
        position: {x: 0.75, y: 0.5}
        size: 0.45 # 45% of page width
  - count: 2
    photos:
      - orientation: portrait
        position: {x: 0.5, y: 0.25}
        size: 0.45 # 45% of page height
      - orientation: portrait
        position: {x: 0.5, y: 0.75}
        size: 0.45 # 45% of page height
  - count: 2
    photos:
      - orientation: landscape
        position: {x: 0.25, y: 0.5}
        size: 0.45
      - orientation: portrait
        position: {x: 0.75, y: 0.5}
        size: 0.45
  - count: 2
    photos:
      - orientation: portrait
        position: {x: 0.25, y: 0.5}
        size: 0.45
      - orientation: landscape
        position: {x: 0.75, y: 0.5}
        size: 0.45

  # 3 Photos
  - count: 3
    photos:
      - orientation: landscape
        position: {x: 0.5, y: 0.25}
        size: 0.4 # width
      - orientation: landscape
        position: {x: 0.25, y: 0.75}
        size: 0.4
      - orientation: landscape
        position: {x: 0.75, y: 0.75}
        size: 0.4
  - count: 3
    photos:
      - orientation: portrait
        position: {x: 0.5, y: 0.25}
        size: 0.4 # height
      - orientation: portrait
        position: {x: 0.25, y: 0.75}
        size: 0.4
      - orientation: portrait
        position: {x: 0.75, y: 0.75}
        size: 0.4
  - count: 3 # L, P, P
    photos:
      - orientation: landscape
        position: {x: 0.5, y: 0.25}
        size: 0.6
      - orientation: portrait
        position: {x: 0.25, y: 0.75}
        size: 0.4
      - orientation: portrait
        position: {x: 0.75, y: 0.75}
        size: 0.4

  # 4 Photos
  - count: 4
    photos:
      - orientation: landscape
        position: {x: 0.25, y: 0.25}
        size: 0.4
      - orientation: landscape
        position: {x: 0.75, y: 0.25}
        size: 0.4
      - orientation: landscape
        position: {x: 0.25, y: 0.75}
        size: 0.4
      - orientation: landscape
        position: {x: 0.75, y: 0.75}
        size: 0.4
  - count: 4
    photos:
      - orientation: portrait
        position: {x: 0.25, y: 0.25}
        size: 0.4
      - orientation: portrait
        position: {x: 0.75, y: 0.25}
        size: 0.4
      - orientation: portrait
        position: {x: 0.25, y: 0.75}
        size: 0.4
      - orientation: portrait
        position: {x: 0.75, y: 0.75}
        size: 0.4

  # 5 Photos
  - count: 5
    photos:
      - orientation: landscape
        position: {x: 0.3, y: 0.25}
        size: 0.3
      - orientation: landscape
        position: {x: 0.7, y: 0.25}
        size: 0.3
      - orientation: portrait
        position: {x: 0.5, y: 0.5}
        size: 0.4
      - orientation: portrait
        position: {x: 0.3, y: 0.75}
        size: 0.3
      - orientation: portrait
        position: {x: 0.7, y: 0.75}
        size: 0.3

  # 6 Photos
  - count: 6
    photos:
      - orientation: landscape
        position: {x: 0.2, y: 0.25}
        size: 0.3
      - orientation: landscape
        position: {x: 0.5, y: 0.25}
        size: 0.3
      - orientation: landscape
        position: {x: 0.8, y: 0.25}
        size: 0.3
      - orientation: portrait
        position: {x: 0.2, y: 0.75}
        size: 0.3
      - orientation: portrait
        position: {x: 0.5, y: 0.75}
        size: 0.3
      - orientation: portrait
        position: {x: 0.8, y: 0.75}
        size: 0.3
